<!DOCTYPE html>
<html lang="en" data-theme="linear" data-font="inter">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tempo Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon"></span>
                    <h2>Tempo</h2>
                </div>
                <button id="toggle-sidebar" class="icon-btn" title="Toggle Sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <h3>WORKSPACE</h3>
                    <ul>
                        <li class="active"><span>Overview</span></li>
                        <li><span>Journals</span></li>
                        <li><span>Plugins <span class="badge">3</span></span></li>
                    </ul>
                </div>
                
                <div class="nav-section">
                    <h3>ACTIVE SESSIONS</h3>
                    <ul id="session-list">
                        <!-- Populated by JS -->
                        <li class="empty-state">No active sessions</li>
                    </ul>
                </div>
            </nav>

            <div class="sidebar-footer">
                <button id="btn-settings" class="footer-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Appearance
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Floating Omnibox -->
            <div id="omnibox-wrapper">
                <form id="omnibox-form">
                    <div class="omnibox">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                        <input type="text" id="url-input" placeholder="Enter URL or command..." autocomplete="off">
                        <div class="omnibox-shortcuts">
                            <kbd>⌘</kbd><kbd>K</kbd>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Dashboard Area -->
            <div id="dashboard-area">
                <div class="dashboard-hero">
                    <h1>Ready.</h1>
                    <p>Agent runtime is active. Waiting for instructions.</p>
                </div>
            </div>
        </main>
        
        <!-- Settings Modal (Hidden) -->
        <div id="settings-overlay" class="hidden">
            <div id="settings-modal">
                <div class="modal-header">
                    <h2>Appearance & Settings</h2>
                    <button id="close-settings" class="icon-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>Theme</label>
                        <div class="theme-picker">
                            <button class="theme-btn active" data-set-theme="linear">Linear</button>
                            <button class="theme-btn" data-set-theme="arc">Arc</button>
                            <button class="theme-btn" data-set-theme="dracula">Dracula</button>
                            <button class="theme-btn" data-set-theme="zen">Zen</button>
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Typography</label>
                        <div class="theme-picker">
                            <button class="font-btn active" data-set-font="inter">Inter (Sans)</button>
                            <button class="font-btn" data-set-font="fira">Fira (Mono)</button>
                        </div>
                    </div>
                    
                    <div class="setting-group">
                        <label>Daemon Address</label>
                        <input type="text" id="daemon-addr" value="http://127.0.0.1:8787" class="settings-input">
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
