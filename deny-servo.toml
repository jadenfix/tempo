# cargo-deny configuration for the optional Servo engine lane.
#
# This is intentionally separate from deny.toml. The default audit remains the
# shipping/default-feature gate; this config is only for the scheduled/manual
# Servo audit that enables the optional servo-vanilla/servo-tempo dependency
# graph and reports upstream Servo advisories without blocking ordinary PRs.

[graph]
all-features = false

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Base project allowlist plus the additional licenses currently present in the
# pinned Servo 0.3.0 dependency graph. Keep this Servo-lane-only; do not copy it
# to deny.toml without a separate redistribution review.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "NCSA",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
github = ["jadenfix"]
