# cargo-deny configuration for the optional Servo engine lane.
# The default shipping graph stays gated by deny.toml. This file audits the
# Servo feature graph separately so known upstream Servo advisories are tracked
# explicitly and new advisories still fail the scheduled/manual Servo audit.

[graph]
all-features = false
no-default-features = true
features = ["servo-tempo"]

[advisories]
version = 2
yanked = "deny"
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2024-0436", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0075", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0080", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0081", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0098", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0100", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0141", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2025-0144", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
    { id = "RUSTSEC-2026-0192", reason = "Tracked by #376 for the optional Servo lane; reassess when updating the pinned Servo crate." },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
    "NCSA",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "warn"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[sources.allow-org]
github = ["jadenfix"]
