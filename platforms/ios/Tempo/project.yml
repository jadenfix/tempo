name: Tempo
options:
  bundleIdPrefix: com.tempo
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  Tempo:
    type: application
    platform: iOS
    sources:
      - Tempo
    resources:
      - Tempo/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tempo.browser
        PRODUCT_NAME: Tempo
        INFOPLIST_FILE: Tempo/Info.plist
  TempoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - TempoTests
    dependencies:
      - target: Tempo
