name: audit
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "41 6 * * *"
  workflow_dispatch:

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo deny (advisories, bans, sources, licenses)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
          rust-version: "1.96.1"
