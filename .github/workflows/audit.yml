name: audit
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    - cron: "41 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo deny (advisories, bans, sources, licenses)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # The action defaults `arguments` to --all-features, which would pull
          # the optional Servo tree into the graph and override deny.toml's
          # `all-features = false`. Audit what ships: the default feature set,
          # pinned by the committed lockfile.
          arguments: --locked
          command: check advisories bans sources licenses
          rust-version: "1.96.1"
