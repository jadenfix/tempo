name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

jobs:
  pr-scope:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require agent and purpose in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s\n' "$PR_BODY" | grep -Eiq '(^|[[:space:]])1\.\)[[:space:]]*agent[[:space:]]+[0-9]+'; then
            echo 'PR body must include: 1.) agent {agent number}'
            exit 1
          fi
          if ! printf '%s\n' "$PR_BODY" | grep -Eiq '(^|[[:space:]])2\.\)[[:space:]]*purpose:[[:space:]]*.+'; then
            echo 'PR body must include: 2.) purpose: {purpose}'
            exit 1
          fi
          if printf '%s\n' "$PR_BODY" | grep -Eiq '(^|[[:space:]])2\.\)[[:space:]]*purpose:[[:space:]]*\{purpose\}[[:space:]]*($|[[:space:]])'; then
            echo 'PR body must replace the purpose placeholder'
            exit 1
          fi

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo check (workspace lints)
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -D clippy::unwrap_used -D clippy::expect_used
      - name: servo public API boundary
        run: bash scripts/check-servo-public-api.sh
      - name: observation boundary (#421)
        run: bash scripts/check-observation-boundary.sh
      - name: no CAPTCHA solving service (#244)
        run: bash scripts/check-no-solver.sh
      - name: denial sentinel guard (#332)
        run: bash scripts/check-denial-sentinels.sh
      - name: toolexec composition status (#406)
        run: bash scripts/check-toolexec-composition-status.sh
      - name: cargo test (contracts + conformance)
        run: cargo test --workspace
      - name: cargo test (toolexec live beatbox)
        run: cargo test --manifest-path tests/toolexec-live/Cargo.toml
      - name: eval budget fixture gate
        run: >
          cargo run -p tempo-cli -- scorecard
          --input fixtures/evals/ci-budget-pass.jsonl
          --min-success-rate 1
          --max-fallback-rate 0
      - name: observe fixture gate
        run: >
          cargo run -p tempo-cli -- observe-gate
          --input fixtures/observe/corpus-pass.json
      - name: compat lane table gate
        run: >
          cargo run -p tempo-cli -- compat-lanes
          --input fixtures/compat/ci-scorecard-pass.json
      - name: injection fixture gate
        run: >
          cargo run -p tempo-cli -- injection-gate
          --input fixtures/security/injection-pass.json
      - name: taint fixture gate
        run: >
          cargo run -p tempo-cli -- taint-gate
          --input fixtures/security/taint-redteam-pass.json
      - name: detect servo-gated changes
        id: servo-gates
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "${BASE_SHA}" || true
            if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              echo "Could not resolve base SHA (${BASE_SHA}); running servo gates conservatively."
              echo "run=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          changed_files="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          servo_gate_pattern='^\.github/workflows/|^Cargo\.(toml|lock)$|^crates/(tempo-engine-servo|tempo-headless|tempo-engine-host|tempo-driver|tempo-net|tempo-schema|tempo-mcp|tempo-session|tempo-shell|tempo-cli|tempo-observe|tempo-compat|tempo-policy|tempo-evals|tempo-config)/|^scripts/(check-servo-public-api|cargo-servo-tempo)\.sh$'
          if printf '%s\n' "${changed_files}" | grep -Eq "${servo_gate_pattern}"; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi
      - name: install Servo system deps
        if: steps.servo-gates.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends pkg-config libfontconfig1-dev llvm
      - name: servo vanilla build gate
        if: steps.servo-gates.outputs.run == 'true'
        run: cargo check -p tempo-engine-servo --no-default-features --features servo-vanilla
      - name: servo tempo fork build gate
        if: steps.servo-gates.outputs.run == 'true'
        run: bash scripts/cargo-servo-tempo.sh

  windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: cargo check (portable core crates)
        run: >
          cargo check --locked
          -p tempo-schema
          -p tempo-driver
          -p tempo-observe
          -p tempo-taint
          -p tempo-act
          -p tempo-policy
          -p tempo-net
          -p tempo-handshake
          -p tempo-session
          -p tempo-skills
          -p tempo-speculate
          -p tempo-agent
          -p tempo-bidi
          -p tempo-mcp
          -p tempo-evals
          -p tempo-compat
          -p tempo-config

  macos-engine-host:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: cargo test (engine-host peer credentials)
        run: cargo test --locked -p tempo-engine-host

  bench-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: criterion benches compile and run once (test mode)
        run: >
          cargo bench
          -p tempo-observe -p tempo-engine-host -p tempo-engine-cdp -p tempo-act
          -p tempo-policy -p tempo-session
          -- --test

  live-cdp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: Install Chrome for live CDP tests
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-dependencies: true
      - name: cargo test (live CDP gates)
        shell: bash
        env:
          TEMPO_CDP_CHROME: ${{ steps.setup-chrome.outputs.chrome-path }}
          TEMPO_CDP_NO_SANDBOX: "1"
        run: |
          set -euo pipefail
          test -n "$TEMPO_CDP_CHROME"
          "$TEMPO_CDP_CHROME" --version
          export TMPDIR="$(mktemp -d)"
          trap 'rm -rf "$TMPDIR"' EXIT
          timeout --foreground 10m cargo test -p tempo-engine-cdp live_cdp -- --nocapture --test-threads=1 2>&1 | tee live-cdp.log
          timeout --foreground 10m cargo test -p tempo-engine-cdp --test uds_driver -- --nocapture --test-threads=1 2>&1 | tee -a live-cdp.log
          timeout --foreground 10m cargo test -p tempo-agent live_cdp -- --nocapture --test-threads=1 2>&1 | tee -a live-cdp.log
          grep -F "test tests::live_cdp_driver_passes_conformance_v2 ... ok" live-cdp.log
          grep -F "test tests::live_cdp_driver_navigates_observes_acts_and_screenshots ... ok" live-cdp.log
          grep -F "test cdp_driver_serves_commands_over_engine_host_uds ... ok" live-cdp.log
          grep -F "test tests::live_cdp_runner_completes_scripted_task_and_journals_it ... ok" live-cdp.log
          if grep -Eiq 'skipping live CDP|TEMPO_CDP_CHROME is unset|TEMPO_CDP_CHROME is not set' live-cdp.log; then
            echo "live CDP tests skipped despite CI Chrome setup"
            exit 1
          fi
