name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pr-scope:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require agent and purpose in PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if ! printf '%s\n' "$PR_BODY" | grep -Eiq '(^|[[:space:]])1\.\)[[:space:]]*agent[[:space:]]+[0-9]+'; then
            echo 'PR body must include: 1.) agent {agent number}'
            exit 1
          fi
          if ! printf '%s\n' "$PR_BODY" | grep -Eiq '(^|[[:space:]])2\.\)[[:space:]]*purpose:[[:space:]]*.+'; then
            echo 'PR body must include: 2.) purpose: {purpose}'
            exit 1
          fi
          if printf '%s\n' "$PR_BODY" | grep -Eiq '(^|[[:space:]])2\.\)[[:space:]]*purpose:[[:space:]]*\{purpose\}[[:space:]]*($|[[:space:]])'; then
            echo 'PR body must replace the purpose placeholder'
            exit 1
          fi

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: cargo fmt
        run: cargo fmt --all --check
      - name: cargo check (workspace lints)
        run: cargo check --workspace --all-targets
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -D clippy::unwrap_used -D clippy::expect_used
      - name: cargo test (contracts + conformance)
        run: cargo test --workspace
      - name: cargo test (live CDP conformance)
        run: |
          CHROME="$(command -v google-chrome || command -v chromium-browser || command -v chromium || true)"
          if [ -z "$CHROME" ]; then
            echo "Chrome/Chromium is required for live CDP conformance"
            exit 1
          fi
          TEMPO_CDP_CHROME="$CHROME" cargo test -p tempo-engine-cdp live_cdp_driver_passes_conformance_v2 -- --nocapture
      # Always-green invariant (final.md §8.3): tempo-engine-servo must build against
      # pinned VANILLA servo. Enabled once the engine crate carries the servo dep.
      # - run: cargo check -p tempo-engine-servo --no-default-features --features servo-vanilla
