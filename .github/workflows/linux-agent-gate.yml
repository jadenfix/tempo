name: linux-agent-gate

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "53 10 * * *"

permissions:
  contents: read

concurrency:
  group: linux-agent-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-smoke-amd64:
    name: Docker Linux agent smoke (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TEMPO_LINUX_AGENT_PLATFORM: linux/amd64
      TEMPO_LINUX_AGENT_REQUIRE_LIVE_CDP: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Show Docker runtime
        run: |
          docker version
          docker info
      - name: Run Linux agent gate
        run: scripts/linux-agent-gate.sh --smoke
      - name: Upload agent browser benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-agent-browser-bench
          path: target/linux-agent-gate/agent-browser-bench
          if-no-files-found: warn
