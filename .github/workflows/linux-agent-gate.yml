name: linux-agent-gate

on:
  pull_request:
  workflow_dispatch:
    inputs:
      mode:
        description: "Linux agent gate mode"
        type: choice
        options:
          - smoke
          - full
        default: smoke
      benchmark_profile:
        description: "Optional browser benchmark optimization profile"
        type: choice
        options:
          - default
          - lifecycle
          - insert-text
          - no-incognito
          - cache
          - desktop
          - runtime
          - no-forced-compositor
          - headless-flag
          - all
        default: default
  schedule:
    - cron: "53 10 * * *"

permissions:
  contents: read

concurrency:
  group: linux-agent-gate-${{ github.event.pull_request.number || format('{0}-{1}-{2}', github.ref, inputs.mode || 'scheduled', inputs.benchmark_profile || 'default') }}
  cancel-in-progress: true

jobs:
  docker-smoke-amd64:
    name: Docker Linux agent smoke (amd64)
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'smoke')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TEMPO_LINUX_AGENT_PLATFORM: linux/amd64
      TEMPO_LINUX_AGENT_REQUIRE_LIVE_CDP: "1"
      TEMPO_LINUX_AGENT_CACHE_DIR: .tempo-linux-agent-cache
      TEMPO_LINUX_AGENT_DOCKER_CACHE_BACKEND: gha
      TEMPO_LINUX_AGENT_DOCKER_CACHE_SCOPE: docker-smoke-amd64-linux-agent
      TEMPO_LINUX_AGENT_BENCH_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_profile || 'default' }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Docker Linux agent build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .tempo-linux-agent-cache
          key: ${{ runner.os }}-${{ github.job }}-linux-agent-${{ hashFiles('Cargo.lock', 'docker/linux-agent.Dockerfile', 'scripts/linux-agent-gate.sh', 'scripts/agent-browser-bench.sh', 'scripts/agent_browser_bench.py', 'scripts/agent_bench_runners/*.py', 'scripts/requirements-agent-bench.txt', 'scripts/validate-agent-bench-artifacts.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-linux-agent-
            ${{ runner.os }}-linux-agent-
      - name: Show Docker runtime
        run: |
          docker version
          docker info
      - name: Run Linux agent gate
        run: scripts/linux-agent-gate.sh --smoke
      - name: Upload agent browser benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-agent-browser-bench
          path: target/linux-agent-gate/agent-browser-bench
          if-no-files-found: warn

  docker-full-amd64:
    name: Docker Linux agent full (amd64)
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      TEMPO_LINUX_AGENT_PLATFORM: linux/amd64
      TEMPO_LINUX_AGENT_REQUIRE_LIVE_CDP: "1"
      TEMPO_LINUX_AGENT_CACHE_DIR: .tempo-linux-agent-cache
      TEMPO_LINUX_AGENT_DOCKER_CACHE_BACKEND: gha
      TEMPO_LINUX_AGENT_DOCKER_CACHE_SCOPE: docker-full-amd64-linux-agent
      TEMPO_LINUX_AGENT_BENCH_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.benchmark_profile || 'default' }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache Docker Linux agent build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .tempo-linux-agent-cache
          key: ${{ runner.os }}-${{ github.job }}-linux-agent-${{ hashFiles('Cargo.lock', 'docker/linux-agent.Dockerfile', 'scripts/linux-agent-gate.sh', 'scripts/agent-browser-bench.sh', 'scripts/agent_browser_bench.py', 'scripts/agent_bench_runners/*.py', 'scripts/requirements-agent-bench.txt', 'scripts/validate-agent-bench-artifacts.py') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-linux-agent-
            ${{ runner.os }}-linux-agent-
      - name: Show Docker runtime
        run: |
          docker version
          docker info
      - name: Run Linux agent gate
        run: scripts/linux-agent-gate.sh --full
      - name: Upload agent browser benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-agent-browser-bench-full
          path: target/linux-agent-gate/agent-browser-bench
          if-no-files-found: warn
